[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".venv",
  "venv",
  "__pycache__",
  ".pytest_cache",
  ".ruff_cache",
  ".mypy_cache",
  "alembic/versions",
  "extensions/**/node_modules",
  "extensions/**/dist",
  "node_modules",
  "dist",
  "out",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501", "B008", "E402"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
no_implicit_optional = true
ignore_missing_imports = true